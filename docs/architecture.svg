<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1829"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff87;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00c853;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0077b6;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#d4430a;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b388ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7c4dff;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ff87"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff4444"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00b4d8"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#00ff87" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    <line x1="200" y1="0" x2="200" y2="800"/><line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/><line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="1000" y1="0" x2="1000" y2="800"/>
  </g>

  <!-- Title -->
  <text x="600" y="45" fill="#00ff87" font-size="22" font-weight="bold" text-anchor="middle" filter="url(#glow)">GuardianAI — System Architecture</text>
  <text x="600" y="65" fill="#888" font-size="12" text-anchor="middle">Trustless Risk Enforcement Agent for Autonomous Trading</text>

  <!-- ===== ROW 1: FRONTEND ===== -->
  <rect x="30" y="90" width="240" height="110" rx="8" fill="url(#blue)" stroke="#00b4d8" stroke-width="1.5"/>
  <text x="150" y="110" fill="#00b4d8" font-size="11" font-weight="bold" text-anchor="middle">REACT DASHBOARD</text>
  <text x="150" y="127" fill="#aaa" font-size="9.5" text-anchor="middle">Capital Monitor</text>
  <text x="150" y="142" fill="#aaa" font-size="9.5" text-anchor="middle">Risk Score Display</text>
  <text x="150" y="157" fill="#aaa" font-size="9.5" text-anchor="middle">Trade Validation Log</text>
  <text x="150" y="172" fill="#aaa" font-size="9.5" text-anchor="middle">Reputation Metrics</text>
  <text x="150" y="189" fill="#00b4d8" font-size="9" text-anchor="middle">[ FRONTEND LAYER ]</text>

  <!-- ===== ROW 1: FASTAPI ===== -->
  <rect x="310" y="90" width="240" height="110" rx="8" fill="url(#green)" stroke="#00ff87" stroke-width="1.5"/>
  <text x="430" y="110" fill="#00ff87" font-size="11" font-weight="bold" text-anchor="middle">FASTAPI BACKEND</text>
  <text x="430" y="127" fill="#aaa" font-size="9.5" text-anchor="middle">POST /trade-intent</text>
  <text x="430" y="142" fill="#aaa" font-size="9.5" text-anchor="middle">GET  /risk-status</text>
  <text x="430" y="157" fill="#aaa" font-size="9.5" text-anchor="middle">GET  /reputation</text>
  <text x="430" y="172" fill="#aaa" font-size="9.5" text-anchor="middle">GET  /logs</text>
  <text x="430" y="189" fill="#00ff87" font-size="9" text-anchor="middle">[ API LAYER ]</text>

  <!-- ===== ROW 1: ERC-8004 ===== -->
  <rect x="590" y="90" width="240" height="110" rx="8" fill="url(#purple)" stroke="#b388ff" stroke-width="1.5"/>
  <text x="710" y="110" fill="#b388ff" font-size="11" font-weight="bold" text-anchor="middle">ERC-8004 IDENTITY</text>
  <text x="710" y="127" fill="#aaa" font-size="9.5" text-anchor="middle">ERC-721 Agent Handle</text>
  <text x="710" y="142" fill="#aaa" font-size="9.5" text-anchor="middle">Agent JSON Metadata</text>
  <text x="710" y="157" fill="#aaa" font-size="9.5" text-anchor="middle">EIP-712 Wallet Binding</text>
  <text x="710" y="172" fill="#aaa" font-size="9.5" text-anchor="middle">Chain-ID Bound</text>
  <text x="710" y="189" fill="#b388ff" font-size="9" text-anchor="middle">[ IDENTITY LAYER ]</text>

  <!-- ===== ROW 1: RISK ROUTER ===== -->
  <rect x="870" y="90" width="295" height="110" rx="8" fill="url(#orange)" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="1018" y="110" fill="#ff6b35" font-size="11" font-weight="bold" text-anchor="middle">RISK ROUTER CONTRACT</text>
  <text x="1018" y="127" fill="#aaa" font-size="9.5" text-anchor="middle">Trade Intent Forwarding</text>
  <text x="1018" y="142" fill="#aaa" font-size="9.5" text-anchor="middle">On-Chain Validation Hash</text>
  <text x="1018" y="157" fill="#aaa" font-size="9.5" text-anchor="middle">Reputation Registry</text>
  <text x="1018" y="172" fill="#aaa" font-size="9.5" text-anchor="middle">Circuit Breaker State</text>
  <text x="1018" y="189" fill="#ff6b35" font-size="9" text-anchor="middle">[ BLOCKCHAIN LAYER ]</text>

  <!-- Arrows row 1 -->
  <line x1="270" y1="145" x2="308" y2="145" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrow-blue)" stroke-dasharray="4,2"/>
  <line x1="550" y1="145" x2="588" y2="145" stroke="#00ff87" stroke-width="1.5" marker-end="url(#arrow-green)" stroke-dasharray="4,2"/>
  <line x1="830" y1="145" x2="868" y2="145" stroke="#b388ff" stroke-width="1.5" marker-end="url(#arrow-gray)" stroke-dasharray="4,2"/>

  <!-- ===== ROW 2: CORE SERVICES ===== -->
  <text x="600" y="248" fill="#666" font-size="10" text-anchor="middle" letter-spacing="2">━━━━━━━━━━━━━━━  CORE SERVICE LAYER  ━━━━━━━━━━━━━━━</text>

  <!-- Risk Engine -->
  <rect x="30" y="265" width="260" height="175" rx="8" fill="url(#green)" stroke="#00ff87" stroke-width="1.5"/>
  <text x="160" y="285" fill="#00ff87" font-size="11" font-weight="bold" text-anchor="middle">risk_engine.py</text>
  <line x1="40" y1="292" x2="280" y2="292" stroke="#00ff87" stroke-width="0.5" opacity="0.4"/>
  <text x="50" y="308" fill="#aaa" font-size="9.5">▸ Max Position Size Rule</text>
  <text x="50" y="323" fill="#aaa" font-size="9.5">▸ Daily Loss Limit</text>
  <text x="50" y="338" fill="#aaa" font-size="9.5">▸ Max Drawdown Threshold</text>
  <text x="50" y="353" fill="#aaa" font-size="9.5">▸ Volatility Filter (MA-based)</text>
  <text x="50" y="368" fill="#aaa" font-size="9.5">▸ Leverage Cap</text>
  <text x="50" y="383" fill="#aaa" font-size="9.5">▸ Circuit Breaker</text>
  <text x="50" y="398" fill="#aaa" font-size="9.5">▸ Historical VaR</text>
  <text x="50" y="413" fill="#aaa" font-size="9.5">▸ Fixed Fractional Position Sizing</text>
  <text x="160" y="430" fill="#00ff87" font-size="9" text-anchor="middle">[ RISK GOVERNANCE ENGINE ]</text>

  <!-- Trade Validator -->
  <rect x="320" y="265" width="255" height="175" rx="8" fill="url(#blue)" stroke="#00b4d8" stroke-width="1.5"/>
  <text x="447" y="285" fill="#00b4d8" font-size="11" font-weight="bold" text-anchor="middle">trade_validator.py</text>
  <line x1="330" y1="292" x2="565" y2="292" stroke="#00b4d8" stroke-width="0.5" opacity="0.4"/>
  <text x="340" y="308" fill="#aaa" font-size="9.5">▸ EIP-712 TradeIntent Struct</text>
  <text x="340" y="323" fill="#aaa" font-size="9.5">▸ Risk Engine Validation</text>
  <text x="340" y="338" fill="#aaa" font-size="9.5">▸ Approval / Rejection Logic</text>
  <text x="340" y="353" fill="#aaa" font-size="9.5">▸ Validation Artifact Emission</text>
  <text x="340" y="368" fill="#aaa" font-size="9.5">▸ EIP-712 Signature (approve)</text>
  <text x="340" y="383" fill="#aaa" font-size="9.5">▸ Log to SQLite</text>
  <text x="340" y="398" fill="#aaa" font-size="9.5">▸ Hash Reference Generation</text>
  <text x="447" y="430" fill="#00b4d8" font-size="9" text-anchor="middle">[ INTENT FLOW LAYER ]</text>

  <!-- Reputation Engine -->
  <rect x="610" y="265" width="255" height="175" rx="8" fill="url(#purple)" stroke="#b388ff" stroke-width="1.5"/>
  <text x="737" y="285" fill="#b388ff" font-size="11" font-weight="bold" text-anchor="middle">reputation_engine.py</text>
  <line x1="620" y1="292" x2="855" y2="292" stroke="#b388ff" stroke-width="0.5" opacity="0.4"/>
  <text x="630" y="308" fill="#aaa" font-size="9.5">▸ Safe Trade Counter</text>
  <text x="630" y="323" fill="#aaa" font-size="9.5">▸ Rejected Risk Trade Counter</text>
  <text x="630" y="338" fill="#aaa" font-size="9.5">▸ Drawdown % Tracking</text>
  <text x="630" y="353" fill="#aaa" font-size="9.5">▸ Sharpe Ratio (simulated)</text>
  <text x="630" y="368" fill="#aaa" font-size="9.5">▸ Reputation Score (0-100)</text>
  <text x="630" y="383" fill="#aaa" font-size="9.5">▸ Publish to Registry</text>
  <text x="737" y="430" fill="#b388ff" font-size="9" text-anchor="middle">[ REPUTATION LAYER ]</text>

  <!-- Sandbox Sim -->
  <rect x="900" y="265" width="260" height="175" rx="8" fill="url(#orange)" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="1030" y="285" fill="#ff6b35" font-size="11" font-weight="bold" text-anchor="middle">sandbox_simulator.py</text>
  <line x1="910" y1="292" x2="1150" y2="292" stroke="#ff6b35" stroke-width="0.5" opacity="0.4"/>
  <text x="920" y="308" fill="#aaa" font-size="9.5">▸ Stablecoin Capital Pool</text>
  <text x="920" y="323" fill="#aaa" font-size="9.5">▸ PnL Simulation</text>
  <text x="920" y="338" fill="#aaa" font-size="9.5">▸ Drawdown Tracking</text>
  <text x="920" y="353" fill="#aaa" font-size="9.5">▸ Mock Price Feed</text>
  <text x="920" y="368" fill="#aaa" font-size="9.5">▸ Trade Execution Sim</text>
  <text x="920" y="383" fill="#aaa" font-size="9.5">▸ Returns History Array</text>
  <text x="1030" y="430" fill="#ff6b35" font-size="9" text-anchor="middle">[ CAPITAL SIMULATION ]</text>

  <!-- ===== ROW 3: TRADE INTENT FLOW ===== -->
  <text x="600" y="480" fill="#666" font-size="10" text-anchor="middle" letter-spacing="2">━━━━━━━━━━━━━━━━━━  TRADE INTENT FLOW  ━━━━━━━━━━━━━━━━━━</text>

  <!-- Step boxes -->
  <rect x="30" y="495" width="165" height="60" rx="6" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="112" y="517" fill="#aaa" font-size="9.5" font-weight="bold" text-anchor="middle">① TRADE INTENT</text>
  <text x="112" y="532" fill="#666" font-size="9" text-anchor="middle">Agent generates</text>
  <text x="112" y="545" fill="#666" font-size="9" text-anchor="middle">EIP-712 struct</text>

  <line x1="195" y1="525" x2="223" y2="525" stroke="#00ff87" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="225" y="495" width="165" height="60" rx="6" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="307" y="517" fill="#aaa" font-size="9.5" font-weight="bold" text-anchor="middle">② RISK ENGINE</text>
  <text x="307" y="532" fill="#666" font-size="9" text-anchor="middle">Validate all rules</text>
  <text x="307" y="545" fill="#666" font-size="9" text-anchor="middle">Compute risk score</text>

  <line x1="390" y1="525" x2="418" y2="525" stroke="#00ff87" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="420" y="495" width="165" height="60" rx="6" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="502" y="517" fill="#aaa" font-size="9.5" font-weight="bold" text-anchor="middle">③ DECISION</text>
  <text x="502" y="532" fill="#00ff87" font-size="9" text-anchor="middle">APPROVE → Sign</text>
  <text x="502" y="545" fill="#ff4444" font-size="9" text-anchor="middle">REJECT → Log</text>

  <!-- Approve arrow -->
  <line x1="585" y1="518" x2="613" y2="518" stroke="#00ff87" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- Reject arrow down -->
  <line x1="502" y1="555" x2="502" y2="590" stroke="#ff4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <rect x="615" y="495" width="165" height="60" rx="6" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="697" y="517" fill="#aaa" font-size="9.5" font-weight="bold" text-anchor="middle">④ RISK ROUTER</text>
  <text x="697" y="532" fill="#666" font-size="9" text-anchor="middle">Forward signed intent</text>
  <text x="697" y="545" fill="#666" font-size="9" text-anchor="middle">to on-chain contract</text>

  <line x1="780" y1="525" x2="808" y2="525" stroke="#00ff87" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="810" y="495" width="165" height="60" rx="6" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="892" y="517" fill="#aaa" font-size="9.5" font-weight="bold" text-anchor="middle">⑤ ARTIFACT</text>
  <text x="892" y="532" fill="#666" font-size="9" text-anchor="middle">Emit validation log</text>
  <text x="892" y="545" fill="#666" font-size="9" text-anchor="middle">+ on-chain hash ref</text>

  <line x1="975" y1="525" x2="1003" y2="525" stroke="#00ff87" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="1005" y="495" width="155" height="60" rx="6" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="1082" y="517" fill="#aaa" font-size="9.5" font-weight="bold" text-anchor="middle">⑥ REPUTATION</text>
  <text x="1082" y="532" fill="#666" font-size="9" text-anchor="middle">Update scores,</text>
  <text x="1082" y="545" fill="#666" font-size="9" text-anchor="middle">publish metrics</text>

  <!-- Validation Artifact box -->
  <rect x="380" y="585" width="240" height="55" rx="6" fill="url(#orange)" stroke="#ff4444" stroke-width="1"/>
  <text x="500" y="603" fill="#ff6b35" font-size="9.5" font-weight="bold" text-anchor="middle">VALIDATION ARTIFACT (REJECTED)</text>
  <text x="500" y="618" fill="#aaa" font-size="9" text-anchor="middle">trade_id | risk_score | rule_triggered</text>
  <text x="500" y="631" fill="#aaa" font-size="9" text-anchor="middle">timestamp | hash_ref | REJECTED</text>

  <!-- ===== ROW 4: TECH STACK ===== -->
  <text x="600" y="673" fill="#666" font-size="10" text-anchor="middle" letter-spacing="2">━━━━━━━━━━━━━━━━━━━━  TECH STACK  ━━━━━━━━━━━━━━━━━━━━</text>

  <rect x="30" y="685" width="170" height="45" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="115" y="703" fill="#aaa" font-size="9.5" font-weight="bold" text-anchor="middle">BACKEND</text>
  <text x="115" y="719" fill="#666" font-size="9" text-anchor="middle">Python · FastAPI · Web3.py · SQLite</text>

  <rect x="215" y="685" width="170" height="45" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="300" y="703" fill="#aaa" font-size="9.5" font-weight="bold" text-anchor="middle">SMART CONTRACTS</text>
  <text x="300" y="719" fill="#666" font-size="9" text-anchor="middle">Solidity · Hardhat · ERC-8004</text>

  <rect x="400" y="685" width="170" height="45" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="485" y="703" fill="#aaa" font-size="9.5" font-weight="bold" text-anchor="middle">SIGNING</text>
  <text x="485" y="719" fill="#666" font-size="9" text-anchor="middle">EIP-712 · eth-account · Web3.py</text>

  <rect x="585" y="685" width="170" height="45" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="670" y="703" fill="#aaa" font-size="9.5" font-weight="bold" text-anchor="middle">FRONTEND</text>
  <text x="670" y="719" fill="#666" font-size="9" text-anchor="middle">React · ethers.js · Tailwind CSS</text>

  <rect x="770" y="685" width="170" height="45" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="855" y="703" fill="#aaa" font-size="9.5" font-weight="bold" text-anchor="middle">TESTNET</text>
  <text x="855" y="719" fill="#666" font-size="9" text-anchor="middle">Sepolia / Base Goerli / Hardhat</text>

  <rect x="955" y="685" width="210" height="45" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="1060" y="703" fill="#aaa" font-size="9.5" font-weight="bold" text-anchor="middle">ALGORITHMS</text>
  <text x="1060" y="719" fill="#666" font-size="9" text-anchor="middle">VaR · Drawdown · Sharpe · MA Vol</text>

  <!-- Border -->
  <rect x="5" y="5" width="1190" height="790" rx="4" fill="none" stroke="#00ff87" stroke-width="0.5" opacity="0.2"/>
</svg>
